<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 260px; font-family: system-ui, sans-serif; font-size: 13px; color: #1a1a2e; }
    header { padding: 12px 14px 8px; display: flex; align-items: center; gap: 8px; }
    header .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    header .dot.on { background: #10a37f; }
    header .dot.off { background: #9ca3af; }
    header h1 { font-size: 14px; font-weight: 600; }
    main { padding: 0 14px 14px; }

    /* current-site card */
    .current { background: #f3f4f6; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .current .domain { font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; word-break: break-all; }
    .current .status { font-size: 11px; color: #6b7280; margin: 4px 0 8px; }
    .current button { width: 100%; padding: 6px 0; border: none; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .current .enable-btn { background: #10a37f; color: #fff; }
    .current .enable-btn:hover { background: #0e8c6e; }
    .current .disable-btn { background: #e5e7eb; color: #374151; }
    .current .disable-btn:hover { background: #d1d5db; }

    /* list */
    .section-title { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; margin-bottom: 4px; }
    #list { list-style: none; max-height: 180px; overflow-y: auto; }
    #list li { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 4px; }
    #list li:nth-child(odd) { background: #f9fafb; }
    #list li .domain { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; }
    #list li button { background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 15px; padding: 0 4px; line-height: 1; }
    #list li button:hover { color: #ef4444; }
    #empty { color: #9ca3af; font-size: 12px; text-align: center; padding: 8px 0; }
  </style>
</head>
<body>
  <header>
    <span id="dot" class="dot off"></span>
    <h1>Formula Copy</h1>
  </header>
  <main>
    <div class="current">
      <div class="domain" id="current-domain">…</div>
      <div class="status" id="current-status"></div>
      <button id="toggle-btn" class="enable-btn">在此网站启用</button>
    </div>
    <div class="section-title">已启用的网站</div>
    <ul id="list"></ul>
    <p id="empty">—</p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
